<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        if (typeof window !== 'undefined' && window.fetch) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => {
              console.warn('Attempted to overwrite window.fetch ignored to prevent crashes. AI Studio environment locks fetch.');
            },
            configurable: true,
          });
        }
        if (typeof globalThis !== 'undefined' && globalThis.fetch) {
          const originalFetchGlobal = globalThis.fetch;
          Object.defineProperty(globalThis, 'fetch', {
            get: () => originalFetchGlobal,
            set: () => {
              console.warn('Attempted to overwrite globalThis.fetch ignored');
            },
            configurable: true,
          });
        }
      } catch (e) {
        console.warn('Failed to protect fetch', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
